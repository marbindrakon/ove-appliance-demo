---
# reset-ove-nodes.yml — Reset OVE nodes for a fresh OCP installation
#
# OVE mode:    Rebuilds root volumes back to blank. USB/agent ISO volume is
#              untouched. On next boot each node falls through to the USB and
#              performs a clean installation.
# Appliance mode: Rebuilds boot volumes with the appliance image, returning
#              nodes to factory state ready for a new configuration ISO.
#
# The bastion and all networking are left untouched.

# Validate inputs
- name: Validate inputs
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Validate inputs
      ansible.builtin.include_tasks: tasks/validate_inputs.yml

# --- OpenStack reset ---
- name: Reset OVE nodes (OpenStack)
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ cache_dir }}/clouds.yaml"
  roles:
    - role: ove_nodes
      vars:
        state: reset
      when: infra_backend == 'openstack'

# --- libvirt reset ---
- name: Add KVM host to inventory (libvirt reset)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Skip for OpenStack backend
      ansible.builtin.meta: end_play
      when: infra_backend == 'openstack'

    - name: Add KVM host to inventory
      ansible.builtin.include_tasks: tasks/add_kvm_host.yml

- name: Reset OVE nodes (libvirt)
  hosts: kvm-host
  gather_facts: false
  become: true
  roles:
    - role: libvirt_ove_nodes
      vars:
        state: reset
