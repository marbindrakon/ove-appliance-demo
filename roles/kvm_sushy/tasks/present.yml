---
- name: Install sushy-tools prerequisites
  ansible.builtin.dnf:
    name:
      - python3-pip
      - python3-libvirt
      - httpd-tools
    state: present

- name: Install sushy-tools and dependencies
  ansible.builtin.pip:
    name:
      - sushy-tools
      - gunicorn
      - libvirt-python
    executable: pip3

- name: Generate htpasswd file
  ansible.builtin.command:
    cmd: "htpasswd -cbB {{ sushy_htpasswd_path }} {{ sushy_username }} {{ sushy_password }}"
  changed_when: true
  no_log: "{{ not debug_mode | default(false) | bool }}"

- name: Set htpasswd file permissions
  ansible.builtin.file:
    path: "{{ sushy_htpasswd_path }}"
    mode: "0600"

- name: Deploy sushy-emulators config
  ansible.builtin.template:
    src: sushy-emulators.conf.j2
    dest: "{{ sushy_config_path }}"
    mode: "0644"
  notify: restart sushy-lab

- name: Deploy sushy-emulators systemd unit
  ansible.builtin.template:
    src: sushy-emulators.service.j2
    dest: "/etc/systemd/system/{{ sushy_service_name }}.service"
    mode: "0644"
  notify: restart sushy-lab

- name: Reload systemd and enable sushy-emulators
  ansible.builtin.systemd:
    name: "{{ sushy_service_name }}"
    daemon_reload: true
    enabled: true
    state: started
