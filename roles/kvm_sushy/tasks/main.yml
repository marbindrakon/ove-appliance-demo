---
- name: Validate state parameter
  ansible.builtin.assert:
    that: state in ['present', 'absent']
    fail_msg: "kvm_sushy: unsupported state '{{ state }}' — expected present or absent"

- name: Deploy sushy-emulator
  ansible.builtin.include_tasks: present.yml
  when: state == 'present'

- name: Remove sushy-emulator
  ansible.builtin.include_tasks: absent.yml
  when: state == 'absent'
