---
- name: Validate state parameter
  ansible.builtin.assert:
    that: state in ['present', 'absent']
    fail_msg: "openstack_project: unsupported state '{{ state }}' — expected present or absent"

- name: Create OpenStack project and credentials
  ansible.builtin.include_tasks: present.yml
  when: state == 'present'

- name: Delete OpenStack project and credentials
  ansible.builtin.include_tasks: absent.yml
  when: state == 'absent'
