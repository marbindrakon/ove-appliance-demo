---
- name: Check if appliance image already exists in Glance
  openstack.cloud.image_info:
    cloud: sushy-cloud
    image: "{{ appliance_image_name }}"
  register: appliance_image_info

- name: Read cloud-user SSH public key
  ansible.builtin.slurp:
    src: /home/cloud-user/.ssh/id_ed25519.pub
  register: bastion_ssh_key_raw

- name: Set SSH public key fact
  ansible.builtin.set_fact:
    bastion_ssh_public_key: "{{ bastion_ssh_key_raw.content | b64decode | trim }}"

- name: Build and upload appliance image
  when: appliance_image_info.images | length == 0
  block:
    - name: Create appliance assets directory
      ansible.builtin.file:
        path: "{{ appliance_assets_dir }}"
        state: directory
        mode: "0755"

    - name: Template appliance-config.yaml
      ansible.builtin.template:
        src: appliance-config.yaml.j2
        dest: "{{ appliance_assets_dir }}/appliance-config.yaml"
        mode: "0644"
      no_log: "{{ not debug_mode | default(false) | bool }}"

    - name: Build appliance disk image
      ansible.builtin.command:
        cmd: >
          podman run --rm --privileged --net=host
          --name appliance-builder
          -v {{ appliance_assets_dir }}:/assets:Z
          {{ appliance_container_image }}
          build
      changed_when: true

    - name: Upload appliance image to Glance
      openstack.cloud.image:
        cloud: sushy-cloud
        name: "{{ appliance_image_name }}"
        filename: "{{ appliance_assets_dir }}/appliance.raw"
        disk_format: raw
        container_format: bare
        state: present

- name: Appliance image already exists in Glance
  ansible.builtin.debug:
    msg: "Appliance image '{{ appliance_image_name }}' already exists in Glance, skipping build"
  when: appliance_image_info.images | length > 0
