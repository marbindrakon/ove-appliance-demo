---
- name: Validate state parameter
  ansible.builtin.assert:
    that: state in ['present', 'absent']
    fail_msg: "appliance_image: unsupported state '{{ state }}' — expected present or absent"

- name: Build and upload appliance image
  ansible.builtin.include_tasks: present.yml
  when: state == 'present'

- name: Delete appliance image
  ansible.builtin.include_tasks: absent.yml
  when: state == 'absent'
