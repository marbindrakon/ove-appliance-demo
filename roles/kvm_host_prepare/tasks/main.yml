---
- name: Validate state parameter
  ansible.builtin.assert:
    that: state in ['present', 'absent']
    fail_msg: "kvm_host_prepare: unsupported state '{{ state }}' — expected present or absent"

- name: Prepare KVM host
  ansible.builtin.include_tasks: present.yml
  when: state == 'present'

- name: Clean up KVM host resources
  ansible.builtin.include_tasks: absent.yml
  when: state == 'absent'
