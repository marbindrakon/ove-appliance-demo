---
# create_ove_nodes.yml — OVE agent ISO install method
#
# Two volumes per node:
#   boot_index: 0  device_type: disk                    — OS install target (blank; no bootloader on first boot)
#   boot_index: 1  device_type: disk  disk_bus: virtio  — USB flash drive pre-provisioned from agent ISO
# On first boot the root volume is blank, so the VM falls through to the USB and runs the
# agent installer, which writes OCP to the root volume. Subsequent reboots boot from root.

- name: Upload OVE agent ISO to Glance
  openstack.cloud.image:
    cloud: "{{ demo_cloud_name }}"
    name: "{{ ove_agent_iso_path | basename }}"
    filename: "{{ ove_agent_iso_path }}"
    disk_format: raw
    container_format: bare
    state: present

- name: Create OVE node root volumes
  openstack.cloud.volume:
    cloud: "{{ demo_cloud_name }}"
    name: "{{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}-volume"
    image: "{{ sushy_blank_image }}"
    size: "{{ ove_node_disk_gb }}"
    state: present
  loop: "{{ range(0, ove_node_count | int) | list }}"

- name: Create OVE node USB volumes from agent ISO
  openstack.cloud.volume:
    cloud: "{{ demo_cloud_name }}"
    name: "{{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}-usb"
    image: "{{ ove_agent_iso_path | basename }}"
    size: "{{ ove_usb_volume_gb }}"
    state: present
  loop: "{{ range(0, ove_node_count | int) | list }}"

- name: Gather OVE node USB volume IDs
  openstack.cloud.volume_info:
    cloud: "{{ demo_cloud_name }}"
    name: "{{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}-usb"
  loop: "{{ range(0, ove_node_count | int) | list }}"
  register: usb_volume_facts

- name: Gather OVE node boot volume IDs
  openstack.cloud.volume_info:
    cloud: "{{ demo_cloud_name }}"
    name: "{{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}-volume"
  loop: "{{ range(0, ove_node_count | int) | list }}"
  register: boot_volume_facts

- name: Check which OVE node VMs already exist
  ansible.builtin.command:
    cmd: >
      openstack --os-cloud {{ demo_cloud_name }} server show
      {{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}
      -f value -c status
  loop: "{{ range(0, ove_node_count | int) | list }}"
  register: vm_status
  failed_when: false
  changed_when: false

- name: Create OVE node VMs
  ansible.builtin.command:
    argv:
      - openstack
      - "--os-cloud"
      - "{{ demo_cloud_name }}"
      - server
      - create
      - "{{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}"
      - "--flavor"
      - "{{ ove_node_flavor }}"
      - "--block-device"
      - "uuid={{ boot_volume_facts.results[item | int].volumes[0].id }},source_type=volume,destination_type=volume,boot_index=0,device_type=disk,delete_on_termination=false"
      - "--block-device"
      - "uuid={{ usb_volume_facts.results[item | int].volumes[0].id }},source_type=volume,destination_type=volume,boot_index=1,device_type=disk,disk_bus=virtio,delete_on_termination=false"
      - "--nic"
      - "port-id={{ hostvars[inventory_hostname]['trunk0_port_id_node' + item | string] }}"
      - "--nic"
      - "port-id={{ hostvars[inventory_hostname]['trunk1_port_id_node' + item | string] }}"
      - "--property"
      - "role=ove_node"
      - "--wait"
  loop: "{{ range(0, ove_node_count | int) | list }}"
  when: vm_status.results[item | int].rc != 0
  changed_when: true
