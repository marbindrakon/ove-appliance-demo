---
- name: Validate state parameter
  ansible.builtin.assert:
    that: state in ['present', 'absent', 'reset']
    fail_msg: "ove_nodes: unsupported state '{{ state }}' — expected present, absent, or reset"

- name: Create OVE nodes
  ansible.builtin.include_tasks: present.yml
  when: state == 'present'

- name: Delete OVE nodes
  ansible.builtin.include_tasks: absent.yml
  when: state == 'absent'

- name: Reset OVE nodes
  ansible.builtin.include_tasks: reset.yml
  when: state == 'reset'
