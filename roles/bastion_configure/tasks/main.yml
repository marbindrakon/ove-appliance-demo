---
- name: Generate SSH key for cloud-user
  ansible.builtin.include_tasks: ssh_key.yml

- name: Configure bastion mgmt interface statically (libvirt backend)
  ansible.builtin.include_tasks: mgmt_iface.yml
  when: infra_backend == 'libvirt'

- name: Register with RHSM
  ansible.builtin.include_tasks: subscription.yml

- name: Configure GNOME desktop
  ansible.builtin.include_tasks: desktop.yml

- name: Configure firewall (no IP forwarding)
  ansible.builtin.include_tasks: firewall.yml

- name: Configure BIND DNS
  ansible.builtin.include_tasks: dns.yml

- name: Configure Chrony NTP server
  ansible.builtin.include_tasks: ntp.yml

- name: Configure sushy-emulator
  ansible.builtin.include_tasks: sushy.yml
  when: infra_backend == 'openstack'

- name: Install OCP client binaries (oc, openshift-install)
  ansible.builtin.include_tasks: ocp_clients.yml

- name: Set console password for cloud-user
  ansible.builtin.include_tasks: console_password.yml
  when: bastion_console_password | default('') | length > 0

- name: Render appliance install configs
  ansible.builtin.include_tasks: install_configs.yml
  when: install_method == 'appliance'

