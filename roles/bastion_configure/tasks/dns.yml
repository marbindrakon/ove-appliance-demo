---
- name: Install BIND and nmstate
  ansible.builtin.dnf:
    name:
      - bind
      - bind-utils
      - nmstate
    state: present

- name: Deploy named.conf
  ansible.builtin.template:
    src: named.conf.j2
    dest: /etc/named.conf
    owner: root
    group: named
    mode: "0640"
  notify: restart named

- name: Deploy forward zone file
  ansible.builtin.template:
    src: ove-zone.db.j2
    dest: "/var/named/{{ base_domain }}.db"
    owner: root
    group: named
    mode: "0640"
  notify: restart named

- name: Deploy reverse zone file
  ansible.builtin.template:
    src: ove-reverse.db.j2
    dest: "/var/named/{{ mgmt_network_cidr | ansible.utils.ipaddr('revdns') | regex_replace('^[0-9]+\\.', '') | regex_replace('\\.$', '') }}.db"
    owner: root
    group: named
    mode: "0640"
  notify: restart named

- name: Start and enable named
  ansible.builtin.systemd:
    name: named
    state: started
    enabled: true

- name: Disable NetworkManager resolv.conf management
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/90-dns-none.conf
    content: |
      [main]
      dns=none
    mode: "0644"
  register: _nm_dns_conf

- name: Reload NetworkManager to apply DNS config
  ansible.builtin.systemd:
    name: NetworkManager
    state: reloaded
  when: _nm_dns_conf is changed

- name: Configure resolv.conf to use local BIND
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 127.0.0.1
    mode: "0644"
