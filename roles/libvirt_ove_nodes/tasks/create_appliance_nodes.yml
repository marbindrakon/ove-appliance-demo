---
# create_appliance_nodes.yml — Appliance factory imaging method for libvirt
#
# One disk per node:
#   vda: thin qcow2 boot disk backed by appliance-base.qcow2
# sushy-emulator attaches a CD-ROM device dynamically on InsertMedia — no pre-defined slot needed

- name: Convert appliance source image to qcow2 base image
  ansible.builtin.command:
    cmd: >
      qemu-img convert -O qcow2
      {{ appliance_image_on_kvm }}
      {{ libvirt_pool_path }}/appliance-base.qcow2
    creates: "{{ libvirt_pool_path }}/appliance-base.qcow2"

- name: Create thin qcow2 boot disk for each node
  ansible.builtin.command:
    cmd: >
      qemu-img create -f qcow2
      -b {{ libvirt_pool_path }}/appliance-base.qcow2
      -F qcow2
      {{ libvirt_pool_path }}/{{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}-boot.qcow2
    creates: "{{ libvirt_pool_path }}/{{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}-boot.qcow2"
  loop: "{{ range(0, ove_node_count | int) | list }}"

- name: Create blank data disks for appliance nodes
  ansible.builtin.command:
    cmd: >
      qemu-img create -f qcow2
      {{ libvirt_pool_path }}/{{ project_name }}-{{ ove_node_name_prefix }}-{{ item.0 }}-data{{ item.1 }}.qcow2
      {{ ove_node_data_disk_gb }}G
    creates: "{{ libvirt_pool_path }}/{{ project_name }}-{{ ove_node_name_prefix }}-{{ item.0 }}-data{{ item.1 }}.qcow2"
  loop: "{{ range(0, ove_node_count | int) | product(range(0, 2)) | list }}"

- name: Define appliance node VMs (powered off — boot after mounting config ISO)
  ansible.builtin.include_tasks: define_node.yml
  loop: "{{ range(0, ove_node_count | int) | list }}"
  loop_control:
    loop_var: node_idx
  vars:
    _boot_disk_format: qcow2
    _boot_disk_ext: qcow2
    _start_domain: false
