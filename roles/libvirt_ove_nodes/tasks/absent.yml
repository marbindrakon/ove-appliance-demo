---
# absent.yml — Destroy and remove OVE node VMs and disk images

- name: Destroy OVE node VMs
  community.libvirt.virt:
    name: "{{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}"
    state: destroyed
  loop: "{{ range(0, ove_node_count | int) | list }}"
  failed_when: false

- name: Undefine OVE node VMs
  ansible.builtin.command:
    cmd: virsh undefine --nvram {{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}
  loop: "{{ range(0, ove_node_count | int) | list }}"
  failed_when: false
  changed_when: true

- name: Find all demo disk images in storage pool
  ansible.builtin.find:
    paths: "{{ libvirt_pool_path }}"
    patterns: "{{ project_name }}-{{ ove_node_name_prefix }}-*"
  register: demo_disk_files

- name: Delete demo disk images
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ demo_disk_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Delete appliance base images (only with destroy_shared)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ libvirt_pool_path }}/appliance-base.raw"
    - "{{ libvirt_pool_path }}/appliance-base.qcow2"
  when: destroy_shared | default(false) | bool
