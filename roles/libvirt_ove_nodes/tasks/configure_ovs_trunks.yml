---
# configure_ovs_trunks.yml — Set OVS trunk port VLAN config for all OVE node NICs
#
# Each node has two trunk ports (t0, t1). Both carry:
#   - mgmt VLAN as native/untagged (PVID)
#   - storage, workload1-3 VLANs as tagged
#
# This must run after VMs are started because libvirt creates the tap devices on start.

- name: Wait for OVS ports to appear
  ansible.builtin.command:
    cmd: ovs-vsctl port-to-br l{{ lab_id | default(0) }}-n{{ item[0] }}-t{{ item[1] }}
  loop: "{{ range(0, ove_node_count | int) | product([0, 1]) | list }}"
  register: port_check
  until: port_check.rc == 0
  retries: 10
  delay: 2
  changed_when: false

- name: Configure OVS trunk ports with native-untagged VLAN mode
  ansible.builtin.command:
    cmd: >
      ovs-vsctl set port l{{ lab_id | default(0) }}-n{{ item[0] }}-t{{ item[1] }}
      vlan_mode=native-untagged
      tag={{ mgmt_vlan_id }}
      trunks={{ mgmt_vlan_id }},{{ storage_vlan_id }},{{ workload1_vlan_id }},{{ workload2_vlan_id }},{{ workload3_vlan_id }}
  loop: "{{ range(0, ove_node_count | int) | product([0, 1]) | list }}"
  changed_when: true
