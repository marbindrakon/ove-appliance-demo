---
# --- OVS bridge for all OVE demo traffic ---

- name: Create OVS bridge
  openvswitch.openvswitch.openvswitch_bridge:
    bridge: "{{ ovs_bridge_name }}"
    state: present

- name: Create OVS internal port for KVM host mgmt access
  openvswitch.openvswitch.openvswitch_port:
    bridge: "{{ ovs_bridge_name }}"
    port: "{{ ovs_mgmt_port }}"
    tag: "{{ mgmt_vlan_id }}"
    state: present
    set: "Interface {{ ovs_mgmt_port }} type=internal"

- name: Assign IP to mgmt-host interface
  ansible.builtin.command:
    cmd: ip addr replace {{ kvm_host_mgmt_ip }}/24 dev {{ ovs_mgmt_port }}
  changed_when: true

- name: Bring up mgmt-host interface
  ansible.builtin.command:
    cmd: ip link set {{ ovs_mgmt_port }} up
  changed_when: true

- name: Make mgmt-host IP persistent via nmcli
  community.general.nmcli:
    conn_name: "{{ ovs_mgmt_port }}"
    ifname: "{{ ovs_mgmt_port }}"
    type: ovs-interface
    ip4: "{{ kvm_host_mgmt_ip }}/24"
    state: present
  failed_when: false

# --- libvirt NAT network for bastion external access ---

- name: Check if NAT network exists
  community.libvirt.virt_net:
    name: "{{ libvirt_nat_network_name }}"
    command: info
  register: nat_net_info
  failed_when: false

- name: Define NAT network
  community.libvirt.virt_net:
    command: define
    name: "{{ libvirt_nat_network_name }}"
    xml: "{{ lookup('template', 'bastion-nat-network.xml.j2') }}"
  when: nat_net_info is failed or libvirt_nat_network_name not in (nat_net_info.networks | default({}))

- name: Start NAT network
  community.libvirt.virt_net:
    name: "{{ libvirt_nat_network_name }}"
    state: active

- name: Autostart NAT network
  community.libvirt.virt_net:
    name: "{{ libvirt_nat_network_name }}"
    autostart: true

# --- Port forwarding: KVM host -> bastion SSH ---

- name: Enable IP forwarding for NAT
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    reload: true
    state: present

# --- dnsmasq for mgmt network DHCP ---

- name: Build mgmt DHCP host list from node IPs
  ansible.builtin.set_fact:
    _mgmt_dhcp_hosts: "{{ _raw }}"
    bastion_mgmt_mac: "{{ mac_prefix }}:00:01"
  vars:
    _raw: >-
      [{% for idx in range(0, ove_node_count | int) %}
      {"mac": "{{ mac_prefix }}:01:{{ '%02x' | format(idx + 11) }}", "ip": "{{ ove_node_mgmt_ips[idx] }}"}{{ "," if not loop.last }}
      {% endfor %}]

- name: Install dnsmasq
  ansible.builtin.dnf:
    name: dnsmasq
    state: present

- name: Template dnsmasq config for mgmt network
  ansible.builtin.template:
    src: dnsmasq-mgmt.conf.j2
    dest: "{{ dnsmasq_config_path }}"
    mode: "0644"
  notify: restart dnsmasq-lab

- name: Template dnsmasq systemd unit
  ansible.builtin.template:
    src: dnsmasq-mgmt.service.j2
    dest: "/etc/systemd/system/{{ dnsmasq_service_name }}.service"
    mode: "0644"
  notify: restart dnsmasq-lab

- name: Enable and start dnsmasq for mgmt network
  ansible.builtin.systemd:
    name: "{{ dnsmasq_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  retries: 3
  delay: 5
  register: _dnsmasq_start
  until: _dnsmasq_start is success

# --- Firewall: allow sushy port on mgmt-host ---

- name: Allow sushy-emulator port on mgmt-host
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ ovs_mgmt_port }}"
    protocol: tcp
    destination_port: "{{ sushy_port }}"
    jump: ACCEPT
    comment: "OVE demo sushy-emulator"
    state: present
