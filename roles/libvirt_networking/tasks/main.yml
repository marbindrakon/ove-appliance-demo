---
- name: Validate state parameter
  ansible.builtin.assert:
    that: state in ['present', 'absent']
    fail_msg: "libvirt_networking: unsupported state '{{ state }}' — expected present or absent"

- name: Create libvirt networking
  ansible.builtin.include_tasks: present.yml
  when: state == 'present'

- name: Remove libvirt networking
  ansible.builtin.include_tasks: absent.yml
  when: state == 'absent'
