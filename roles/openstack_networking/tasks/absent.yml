---
# absent.yml — Delete OpenStack networks, subnets, and router
- name: Delete router
  openstack.cloud.router:
    cloud: "{{ demo_cloud_name }}"
    name: "{{ project_name }}-router"
    state: absent

- name: Delete subnets
  openstack.cloud.subnet:
    cloud: "{{ demo_cloud_name }}"
    name: "{{ item.name }}-subnet"
    state: absent
  loop: "{{ demo_networks }}"

- name: Delete networks
  openstack.cloud.network:
    cloud: "{{ demo_cloud_name }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ demo_networks }}"
