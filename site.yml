# site.yml — OVE Appliance Demo Environment Orchestrator
---
# Validate inputs
- name: Validate inputs
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Validate inputs
      ansible.builtin.include_tasks: tasks/validate_inputs.yml

# Play 1: Create OpenStack infrastructure (project, networks, bastion VM)
- name: Create OVE demo infrastructure (OpenStack)
  hosts: localhost
  connection: local
  gather_facts: false
  pre_tasks:
    - name: Ensure local cache directory exists
      ansible.builtin.file:
        path: "{{ cache_dir }}"
        state: directory
        mode: '0700'

    # Initialize lab-local clouds.yaml from system config so each lab has
    # its own copy and parallel OpenStack labs don't collide on writes.
    - name: Find system clouds.yaml path
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ lookup('env', 'HOME') }}/.config/openstack/clouds.yaml"
        - "/etc/openstack/clouds.yaml"
      register: _system_clouds_yaml
      when: infra_backend == 'openstack'

    - name: Initialize lab-local clouds.yaml from system config
      ansible.builtin.copy:
        src: "{{ (_system_clouds_yaml.results | selectattr('stat.exists') | first).item }}"
        dest: "{{ cache_dir }}/clouds.yaml"
        mode: '0600'
        force: false
      when: infra_backend == 'openstack'
      no_log: "{{ not debug_mode | default(false) | bool }}"
  roles:
    - role: openstack_project
      tags: [infra, openstack]
      when: infra_backend == 'openstack'
      environment:
        OS_CLIENT_CONFIG_FILE: "{{ cache_dir }}/clouds.yaml"
    - role: openstack_networking
      tags: [infra, networking, openstack]
      when: infra_backend == 'openstack'
      environment:
        OS_CLIENT_CONFIG_FILE: "{{ cache_dir }}/clouds.yaml"
    - role: bastion_vm
      tags: [infra, bastion, openstack]
      when: infra_backend == 'openstack'
      environment:
        OS_CLIENT_CONFIG_FILE: "{{ cache_dir }}/clouds.yaml"
  tasks:
    - name: Add KVM host to inventory
      ansible.builtin.include_tasks: tasks/add_kvm_host.yml

# Play 1b: Prepare KVM host and create bastion VM (libvirt only)
- name: Prepare KVM host and create bastion VM (libvirt)
  hosts: kvm-host
  gather_facts: true
  become: true
  roles:
    - role: kvm_host_prepare
      tags: [infra, libvirt]
    - role: libvirt_networking
      tags: [infra, networking, libvirt]
    - role: libvirt_bastion
      tags: [infra, bastion, libvirt]

# Play 2: Configure bastion host services (generates SSH key for cloud-user)
- name: Configure bastion host
  hosts: ove_demo_bastion
  gather_facts: false
  become: true
  pre_tasks:
    - name: Wait for bastion SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 15
        timeout: 300
    - name: Gather facts
      ansible.builtin.setup:
  vars:
    os_auth_url: "{{ lookup('env', 'OS_AUTH_URL') | default(hostvars['localhost']['os_auth_url'] | default(''), true) }}"
    os_region: "{{ lookup('env', 'OS_REGION_NAME') | default(hostvars['localhost']['os_region'] | default('RegionOne'), true) }}"
    sushy_app_credential_id: "{{ hostvars['localhost']['sushy_app_credential_id'] | default('') }}"
    sushy_app_credential_secret: "{{ hostvars['localhost']['sushy_app_credential_secret'] | default('') }}"
  roles:
    - role: bastion_configure
      tags: [bastion]

# Play 3: Build appliance image on bastion (appliance mode only, skipped if image supplied)
- name: Build appliance image on bastion
  hosts: ove_demo_bastion
  gather_facts: false
  become: true
  roles:
    - role: appliance_image
      tags: [appliance]
      when:
        - install_method == 'appliance'
        - appliance_image_path | default('') | length == 0
        - appliance_glance_image | default('') | length == 0
        - not (infra_backend == 'libvirt' and
               appliance_kvm_host_image_path | default('') | length > 0)

# Play 4a: Create OVE node trunks and VMs (OpenStack)
- name: Create OVE nodes (OpenStack)
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ cache_dir }}/clouds.yaml"
  pre_tasks:
    # --- Appliance mode: upload image from controller if local path supplied ---
    - name: Upload pre-built appliance image from controller to Glance
      openstack.cloud.image:
        cloud: "{{ demo_cloud_name }}"
        name: "{{ appliance_image_name }}"
        filename: "{{ appliance_image_path }}"
        disk_format: raw
        container_format: bare
        state: present
      when:
        - infra_backend == 'openstack'
        - install_method == 'appliance'
        - appliance_image_path | default('') | length > 0
        - appliance_glance_image | default('') | length == 0

    # --- OVE mode: upload ISO from controller (skipped if existing Glance image supplied) ---
    - name: Upload OVE agent ISO to Glance
      openstack.cloud.image:
        cloud: "{{ demo_cloud_name }}"
        name: "{{ ove_agent_iso_path | basename }}"
        filename: "{{ ove_agent_iso_path }}"
        disk_format: raw
        container_format: bare
        state: present
      when:
        - infra_backend == 'openstack'
        - install_method == 'ove'
        - ove_agent_glance_image | default('') | length == 0
  roles:
    - role: ove_nodes
      tags: [nodes, openstack]
      when: infra_backend == 'openstack'

# Play 4b: Create OVE node VMs (libvirt)
- name: Create OVE nodes (libvirt)
  hosts: kvm-host
  gather_facts: false
  become: true
  pre_tasks:
    # Transfer appliance image from bastion to KVM host if built on bastion
    - name: Use appliance image already on KVM host
      ansible.builtin.set_fact:
        appliance_image_on_kvm: "{{ appliance_kvm_host_image_path }}"
      when:
        - install_method == 'appliance'
        - appliance_kvm_host_image_path | default('') | length > 0

    - name: Check if appliance image exists on KVM host
      ansible.builtin.stat:
        path: "{{ libvirt_pool_path | default('/var/lib/libvirt/images/ove-demo') }}/appliance-base.raw"
      register: appliance_on_kvm
      when:
        - install_method == 'appliance'
        - appliance_image_path | default('') | length == 0
        - appliance_kvm_host_image_path | default('') | length == 0

    - name: Generate SSH key on KVM host root for bastion image transfer
      ansible.builtin.user:
        name: root
        generate_ssh_key: true
        ssh_key_type: ed25519
        ssh_key_comment: "root@kvm-host"
      register: _kvm_root_ssh_key
      when:
        - install_method == 'appliance'
        - appliance_image_path | default('') | length == 0
        - appliance_kvm_host_image_path | default('') | length == 0
        - not (appliance_on_kvm.stat.exists | default(false))

    - name: Authorize KVM host root key on bastion for image transfer
      ansible.posix.authorized_key:
        user: cloud-user
        key: "{{ _kvm_root_ssh_key.ssh_public_key }}"
        comment: "kvm-host-transfer"
        state: present
      delegate_to: "{{ groups['ove_demo_bastion'][0] }}"
      when:
        - install_method == 'appliance'
        - appliance_image_path | default('') | length == 0
        - appliance_kvm_host_image_path | default('') | length == 0
        - not (appliance_on_kvm.stat.exists | default(false))

    - name: Ensure /root is traversable on bastion for appliance image SCP transfer
      ansible.builtin.file:
        path: /root
        mode: "0711"
      delegate_to: "{{ groups['ove_demo_bastion'][0] }}"
      when:
        - install_method == 'appliance'
        - appliance_image_path | default('') | length == 0
        - appliance_kvm_host_image_path | default('') | length == 0
        - not (appliance_on_kvm.stat.exists | default(false))

    - name: Fetch appliance image from bastion to KVM host
      ansible.builtin.command:
        cmd: >
          scp -o StrictHostKeyChecking=no
          cloud-user@{{ libvirt_nat_bastion_ip }}:{{ appliance_assets_dir | default('/root/appliance-assets') }}/appliance.raw
          {{ libvirt_pool_path | default('/var/lib/libvirt/images/ove-demo') }}/appliance-base.raw
      when:
        - install_method == 'appliance'
        - appliance_image_path | default('') | length == 0
        - appliance_kvm_host_image_path | default('') | length == 0
        - not (appliance_on_kvm.stat.exists | default(false))
      changed_when: true

    - name: Copy pre-built appliance image from controller to KVM host
      ansible.builtin.copy:
        src: "{{ appliance_image_path }}"
        dest: "{{ libvirt_pool_path | default('/var/lib/libvirt/images/ove-demo') }}/appliance-base.raw"
        mode: "0644"
      when:
        - install_method == 'appliance'
        - appliance_image_path | default('') | length > 0
  roles:
    - role: libvirt_ove_nodes
      tags: [nodes, libvirt]

# Play 5: Deploy sushy-emulator on KVM host (libvirt only)
- name: Deploy sushy-emulator on KVM host (libvirt)
  hosts: kvm-host
  gather_facts: false
  become: true
  roles:
    - role: kvm_sushy
      tags: [sushy, libvirt]
