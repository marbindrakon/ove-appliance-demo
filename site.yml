# site.yml — OVE Appliance Demo Environment Orchestrator
---
# Play 1: Create OpenStack infrastructure (project, networks, VMs)
- name: Create OVE demo infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  pre_tasks:
    - name: Ensure local cache directory exists
      ansible.builtin.file:
        path: ".ove-demo-cache"
        state: directory
        mode: '0700'
  roles:
    - openstack_project
    - openstack_networking
    - bastion_vm

# Play 2: Configure bastion host services (generates SSH key for cloud-user)
- name: Configure bastion host
  hosts: ove_demo_bastion
  gather_facts: true
  become: true
  vars:
    os_auth_url: "{{ lookup('env', 'OS_AUTH_URL') | default(hostvars['localhost']['os_auth_url'], true) }}"
    os_region: "{{ lookup('env', 'OS_REGION_NAME') | default(hostvars['localhost']['os_region'] | default('RegionOne'), true) }}"
    sushy_app_credential_id: "{{ hostvars['localhost']['sushy_app_credential_id'] }}"
    sushy_app_credential_secret: "{{ hostvars['localhost']['sushy_app_credential_secret'] }}"
  roles:
    - bastion_configure

# Play 3: Build appliance image on bastion (appliance mode only)
- name: Build appliance image on bastion
  hosts: ove_demo_bastion
  gather_facts: false
  become: true
  roles:
    - role: appliance_image
      when: install_method | default('ove') == 'appliance'

# Play 4: Create OVE node trunks and VMs
- name: Create OVE nodes
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - ove_nodes
