---
# unmount-ove-nodes.yml — Eject the agent ISO from OVE nodes
#
# Rebuilds each OVE node's USB volume (boot_index: 0) back to the blank
# sushy image, effectively ejecting the ISO and returning the nodes to an
# empty boot state.
#
# Run from the Ansible controller:
#   ansible-playbook unmount-ove-nodes.yml -i inventory/
#
# Prerequisites:
#   - OVE nodes must be running (site.yml completed)
#   - sushy_blank_image must exist in Glance

- name: Eject agent ISO from OVE nodes
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Fail if not in OVE mode
      ansible.builtin.fail:
        msg: "This playbook is only applicable when install_method == 'ove' (current: {{ install_method | default('ove') }})"
      when: install_method | default('ove') != 'ove'

    - name: Gather blank image info
      openstack.cloud.image_info:
        cloud: "{{ demo_cloud_name }}"
        image: "{{ sushy_blank_image }}"
      register: blank_image_facts

    - name: Fail if blank image not found
      ansible.builtin.fail:
        msg: "Blank image '{{ sushy_blank_image }}' not found in Glance"
      when: blank_image_facts.images | length == 0

    - name: Rebuild OVE node USB volumes with blank image
      ansible.builtin.command:
        cmd: >
          openstack --os-cloud {{ demo_cloud_name }} server rebuild
          {{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}
          --reimage-boot-volume
          --image {{ blank_image_facts.images[0].id }}
      loop: "{{ range(0, ove_node_count | int) | list }}"
      changed_when: true

    - name: Wait for OVE node VMs to reach ACTIVE state
      ansible.builtin.command:
        cmd: >
          openstack --os-cloud {{ demo_cloud_name }} server show
          {{ project_name }}-{{ ove_node_name_prefix }}-{{ item }}
          -f value -c status
      loop: "{{ range(0, ove_node_count | int) | list }}"
      register: server_status
      until: server_status.stdout in ['ACTIVE', 'ERROR']
      retries: 30
      delay: 30
      changed_when: false

    - name: Fail if any VM entered ERROR state
      ansible.builtin.fail:
        msg: "OVE node {{ item.item }} is in ERROR state after rebuild"
      when: item.stdout == 'ERROR'
      loop: "{{ server_status.results }}"
      loop_control:
        label: "{{ item.item }}"
