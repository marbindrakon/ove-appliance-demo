# teardown.yml — Destroy all OVE demo resources
---
# Validate inputs
- name: Validate inputs
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Validate inputs
      ansible.builtin.include_tasks: tasks/validate_inputs.yml

# --- OpenStack teardown (reverse dependency order) ---
- name: Tear down OVE demo environment (OpenStack)
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ cache_dir }}/clouds.yaml"
  pre_tasks:
    - name: Skip OpenStack teardown for libvirt backend
      ansible.builtin.meta: end_play
      when: infra_backend == 'libvirt'

    - name: Ensure local cache directory exists
      ansible.builtin.file:
        path: "{{ cache_dir }}"
        state: directory
        mode: '0700'

    # Ensure lab-local clouds.yaml exists for API auth during teardown.
    # If the cache was deleted, recreate from system config + demo entries.
    - name: Check if lab-local clouds.yaml exists
      ansible.builtin.stat:
        path: "{{ cache_dir }}/clouds.yaml"
      register: _lab_clouds_yaml

    - name: Find system clouds.yaml path
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ lookup('env', 'HOME') }}/.config/openstack/clouds.yaml"
        - "/etc/openstack/clouds.yaml"
      register: _system_clouds_yaml
      when: not _lab_clouds_yaml.stat.exists

    - name: Recreate lab-local clouds.yaml with demo entries for teardown
      vars:
        _system_path: "{{ (_system_clouds_yaml.results | selectattr('stat.exists') | first).item }}"
        _existing: "{{ lookup('file', _system_path) | from_yaml }}"
        _demo_auth: "{{ _existing.clouds[cloud_name].auth | combine({'project_name': project_name, 'project_domain_name': project_domain}) }}"
        _demo_cloud: "{{ _existing.clouds[cloud_name] | combine({'auth': _demo_auth}) }}"
        _updated: "{{ _existing | combine({'clouds': {project_name: _demo_cloud}}, recursive=True) }}"
      ansible.builtin.copy:
        content: "{{ _updated | to_nice_yaml(indent=2) }}"
        dest: "{{ cache_dir }}/clouds.yaml"
        mode: '0600'
      when: not _lab_clouds_yaml.stat.exists
      no_log: "{{ not debug_mode | default(false) | bool }}"

  roles:
    - role: ove_nodes
      state: absent
    - role: appliance_image
      state: absent
      when: install_method == 'appliance'
    - role: bastion_vm
      state: absent
    - role: openstack_networking
      state: absent
    - role: openstack_project
      state: absent

# --- libvirt teardown (reverse dependency order) ---
- name: Add KVM host to inventory (libvirt teardown)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Skip for OpenStack backend
      ansible.builtin.meta: end_play
      when: infra_backend == 'openstack'

    - name: Add KVM host to inventory
      ansible.builtin.include_tasks: tasks/add_kvm_host.yml

- name: Tear down OVE demo environment (libvirt)
  hosts: kvm-host
  gather_facts: false
  become: true
  roles:
    - role: libvirt_ove_nodes
      state: absent
    - role: kvm_sushy
      state: absent
    - role: libvirt_bastion
      state: absent
    - role: libvirt_networking
      state: absent
    - role: kvm_host_prepare
      state: absent
